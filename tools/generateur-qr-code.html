<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de QR code gratuit — Atelier</title>
<meta name="description" content="Créez un QR code à partir d'un lien ou d'un texte et téléchargez-le en image PNG, gratuitement et sans inscription.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="brand"><span class="brand-mark">A</span>Atelier</a>
    <nav class="crumbs"><a href="../index.html#outils">Tous les outils</a></nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-header">
    <span class="eyebrow">Partage</span>
    <h1>Générateur de QR code</h1>
    <p>Entrez un lien ou un texte, votre QR code apparaît instantanément.</p>
  </div>

  <div class="panel">
    <label for="qrText">Lien ou texte</label>
    <input type="text" id="qrText" placeholder="https://exemple.fr">

    <label for="qrSize">Taille : <span id="sizeVal">240</span> px</label>
    <input type="range" id="qrSize" min="120" max="480" value="240">

    <div id="qrHolder" style="margin-top:22px; display:flex; justify-content:center; padding:20px; background:var(--paper-dim); border:1px dashed var(--line); border-radius:3px;"></div>

    <div class="actions">
      <button class="secondary" id="downloadBtn">Télécharger en PNG</button>
    </div>
  </div>

  <div class="ad-slot">Emplacement publicitaire</div>
</main>

<footer class="site-footer">
  <div class="container">
    <span>Atelier — outils gratuits, 2026.</span>
    <span><a href="../index.html#outils">Tous les outils</a></span>
  </div>
</footer>

<script>
const qrText = document.getElementById('qrText');
const qrSize = document.getElementById('qrSize');
const sizeVal = document.getElementById('sizeVal');
const holder = document.getElementById('qrHolder');
let qr = null;

function render() {
  holder.innerHTML = '';
  const value = qrText.value.trim() || 'https://exemple.fr';
  qr = new QRCode(holder, {
    text: value,
    width: parseInt(qrSize.value, 10),
    height: parseInt(qrSize.value, 10),
    colorDark: '#1B2B3A',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
}

qrText.addEventListener('input', render);
qrSize.addEventListener('input', () => { sizeVal.textContent = qrSize.value; render(); });

document.getElementById('downloadBtn').addEventListener('click', () => {
  const img = holder.querySelector('img') || holder.querySelector('canvas');
  if (!img) return;
  const link = document.createElement('a');
  link.download = 'qr-code.png';
  link.href = img.src || img.toDataURL('image/png');
  link.click();
});

render();
</script>

</body>
</html>
